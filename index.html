<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atoll</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body class="collapsed">
    <div id="app">
      <!-- collapsed island -->
      <div id="island" class="island status-empty"></div>

      <!-- expanded panel -->
      <div id="panel">
        <header class="phead" data-tauri-drag-region>
          <div class="pbrand" title="Atoll">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3.3" fill="currentColor"/></svg>
          </div>
          <div class="ptabs">
            <button id="tab-limits" data-tab="limits" type="button">Limits</button>
            <button id="tab-analytics" data-tab="analytics" type="button">Analytics</button>
          </div>
          <span class="rate" id="rate"></span>
          <span class="refresh-in" id="refresh-in"></span>
          <button id="refresh" title="Refresh">⟳</button>
          <button id="share-btn" title="Share">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.6" y1="10.5" x2="15.4" y2="6.5"></line>
              <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"></line>
            </svg>
          </button>
          <button id="gear" title="Settings">⚙</button>
          <button id="collapse" title="Collapse">▾</button>
        </header>

        <section id="settings" hidden></section>
        <section id="share" hidden></section>

        <section id="cards"></section>

        <nav class="subtabs" id="subtabs"></nav>
        <div class="toggles" id="toggles"></div>
        <section id="analytics"></section>
      </div>

      <!-- dev-only mock switcher (hidden under Tauri) -->
      <div id="devbar"></div>
    </div>
  </body>
</html>
